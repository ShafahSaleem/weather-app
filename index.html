<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather app</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter City Name" spellcheck="false">
            <button><img src="images/search.png"></button>
            <ul class="suggestions"></ul>
        </div>
        <div class="error">
            <p>Invalid City Name</p>
        </div>
        <div class="loading">Loading...</div>
        <div class="weather">
            <img src="images/rain.png" class="weather-icon">
            <h1 class="temp">22°c</h1>
            <h2 class="city">Kadavathur</h2>
            <div class="details">
                <div class="col">
                    <img src="images/humidity.png">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const regionNames = new Intl.DisplayNames(['en'], { type: 'region' });
        const apiKey = "73a05335c1ad58743885eeccc0b40be4";
        const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

        const searchBox = document.querySelector(".search input");
        const searchBtn = document.querySelector(".search button");
        const weatherIcon = document.querySelector(".weather-icon");
        const suggestions = document.querySelector(".suggestions");

        let userLat = null;
        let userLon = null;

        navigator.geolocation.getCurrentPosition(
            (position) => {
                userLat = position.coords.latitude;
                userLon = position.coords.longitude;
            },
            (error) => {
                console.log("Location access denied");
            }
        );
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth radius (km)
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;

            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) *
                Math.sin(dLon / 2);

            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c;
        }

        async function checkWeather(city) {
            document.querySelector(".loading").style.display = "block";
            document.querySelector(".weather").style.display = "none";
            document.querySelector(".error").style.display = "none";
            const response = await fetch(apiUrl + city + `&appid=${apiKey}`);

            if (response.status == 404) {
                document.querySelector(".loading").style.display = "none";
                document.querySelector(".error").style.display = "block";
                document.querySelector(".weather").style.display = "None";
            } else {
                var data = await response.json();
                // SORT BY DISTANCE (nearest first)
                if (userLat && userLon) {
                    data.sort((a, b) => {
                        const distA = getDistance(userLat, userLon, a.lat, a.lon);
                        const distB = getDistance(userLat, userLon, b.lat, b.lon);
                        return distA - distB;
                    });
                }

                document.querySelector(".loading").style.display = "none";
                document.querySelector(".city").innerHTML = data.name;
                document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°c";
                document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
                document.querySelector(".wind").innerHTML = data.wind.speed + "km/h";

                if (data.weather[0].main == "Clouds") {
                    weatherIcon.src = "images/clouds.png";
                }
                else if (data.weather[0].main == "Clear") {
                    weatherIcon.src = "images/clear.png";
                }
                else if (data.weather[0].main == "Rain") {
                    weatherIcon.src = "images/rain.png";
                }
                else if (data.weather[0].main == "Drizzle") {
                    weatherIcon.src = "images/drizzle.png";
                }
                else if (data.weather[0].main == "Mist") {
                    weatherIcon.src = "images/mist.png";
                }
                else if (data.weather[0].main == "Snow") {
                    weatherIcon.src = "images/snow.png";
                }
                document.querySelector(".weather").style.display = "block";
                document.querySelector(".error").style.display = "None";

            }



        }

        searchBtn.addEventListener("click", () => {
            checkWeather(searchBox.value);
            suggestions.style.display = "none";
        });
        searchBox.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                checkWeather(searchBox.value);
                suggestions.style.display = "none";
            }
        });
        async function getCities(city) {

            // If user types less than 2 letters → hide dropdown
            if (city.length < 2) {
                suggestions.innerHTML = "";
                suggestions.style.display = "none";
                return;
            }

            // API for city suggestions
            const geoUrl = `https://api.openweathermap.org/geo/1.0/direct?q=${city}&limit=10&appid=${apiKey}`;

            const response = await fetch(geoUrl);
            const data = await response.json();

            // clear old list
            suggestions.innerHTML = "";

            // If no results → hide dropdown
            if (data.length === 0) {
                suggestions.style.display = "none";
                return;
            }

            // show dropdown
            suggestions.style.display = "block";

            // create list items
            data.forEach(place => {

                const li = document.createElement("li");

                // show city + country
                li.innerHTML = `📍 ${place.name}${place.state ? ", " + place.state : ""}, ${regionNames.of(place.country)}`;

                // when clicked
                li.addEventListener("click", (e) => {
                    e.stopPropagation(); // IMPORTANT
                    searchBox.value = place.name;
                    suggestions.style.display = "none";
                    checkWeather(place.name);
                });

                suggestions.appendChild(li);
            });
            console.log(data);
        }
        let timeout;

        searchBox.addEventListener("input", () => {
            clearTimeout(timeout);

            timeout = setTimeout(() => {
                getCities(searchBox.value);
            }, 300);
        });
        document.addEventListener("click", function (e) {
            if (!document.querySelector(".search").contains(e.target)) {
                suggestions.style.display = "none";
            }
        });
    </script>




</body>

</html>
